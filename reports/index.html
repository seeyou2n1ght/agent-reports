<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有报告 - Agent Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown-light.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        .site-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
        }

        .site-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .site-header a {
            color: white;
            text-decoration: none;
        }

        /* Navigation */
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }

        nav .nav-content {
            max-width: 900px;
            margin: 0 auto;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* Main Content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Report List */
        .report-list {
            display: grid;
            gap: 1rem;
        }

        .report-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .report-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .report-date {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .report-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .report-title a {
            color: var(--text);
            text-decoration: none;
        }

        .report-title a:hover {
            color: var(--primary);
        }

        .report-desc {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .report-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
        }

        /* Month Section */
        .month-section {
            margin-bottom: 2rem;
        }

        .month-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1><a href="/">🤖 Agent Reports</a></h1>
    </header>

    <nav>
        <div class="nav-content">
            <a href="/">← 返回首页</a>
        </div>
    </nav>

    <main>
        <h1 style="margin-bottom: 1.5rem;">📚 所有报告</h1>

        <div class="month-section">
            <h2 class="month-title">2026年3月</h2>
            <div class="report-list">
                <article class="report-item">
                    <div class="report-meta">
                        <span class="report-date">2026-03-01</span>
                    </div>
                    <h3 class="report-title">
                        <a href="./2026-03/telegram-bot-debug.html">Pi Telegram Bot 问题排查与架构重构</a>
                    </h3>
                    <p class="report-desc">Telegram Bot 退出 TUI 后无响应问题的完整排查过程，包含架构分析、spawn 配置问题和解决方案。</p>
                    <div class="report-tags">
                        <span class="tag">debug</span>
                        <span class="tag">nodejs</span>
                        <span class="tag">telegram</span>
                        <span class="tag">architecture</span>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <footer>
        <p>Generated by pi-coding-agent · Deployed on Cloudflare Pages</p>
    </footer>
</body>
</html>
