{{ define "head" }}
<style>
    .article-header {
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid var(--border);
    }
    .article-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        line-height: 1.3;
    }
    .article-meta {
        display: flex;
        gap: 1rem;
        color: var(--text-light);
        font-size: 0.875rem;
        flex-wrap: wrap;
    }
    .content {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .content h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--primary);
    }
    .content h2 {
        font-size: 1.375rem;
        font-weight: 600;
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--border);
    }
    .content h3 {
        font-size: 1.125rem;
        font-weight: 600;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
    }
    .content p { margin-bottom: 1rem; }
    .content a { color: var(--primary); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content ul, .content ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
    }
    .content li { margin-bottom: 0.5rem; }
    .content code {
        background: var(--code-bg);
        color: var(--text);
        padding: 0.2em 0.4em;
        border-radius: 4px;
        font-size: 0.875em;
        font-family: 'SF Mono', Monaco, monospace;
    }
    .content pre {
        background: var(--pre-bg);
        color: var(--pre-color);
        border-radius: 8px;
        padding: 1.25rem;
        overflow-x: auto;
        margin-bottom: 1.5rem;
    }
    .content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: 0.875rem;
        line-height: 1.7;
    }
    .content table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5rem;
        font-size: 0.9375rem;
    }
    .content th,
    .content td {
        padding: 0.75rem;
        border: 1px solid var(--border);
        text-align: left;
    }
    .content th {
        background: var(--bg);
        font-weight: 600;
    }
    .content tr:nth-child(even) { background: var(--bg); }
    .content blockquote {
        border-left: 4px solid var(--primary);
        background: rgba(37, 99, 235, 0.05);
        padding: 1rem 1.25rem;
        margin: 1.5rem 0;
        border-radius: 0 8px 8px 0;
    }
    .content blockquote p { margin: 0; }
    .content hr {
        border: none;
        border-top: 2px solid var(--border);
        margin: 2.5rem 0;
    }
    .tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
    }
    .tag {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--primary);
        background: rgba(37, 99, 235, 0.1);
        padding: 0.375rem 0.875rem;
        border-radius: 9999px;
    }
    @media (max-width: 768px) {
        .content { padding: 1.5rem; }
        .article-title { font-size: 1.5rem; }
    }
</style>
{{ end }}

{{ define "main" }}
<article>
    <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="article-meta">
            <span>📅 {{ .Date.Format "2006-01-02" }}</span>
            <span>⏱️ 阅读约 {{ .ReadingTime }} 分钟</span>
            {{ with .Params.status }}<span>✅ {{ . }}</span>{{ end }}
        </div>
    </header>

    <div class="content">
        {{ .Content }}
        
        {{ with .Params.tags }}
        <div class="tags">
            {{ range . }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </div>
</article>
{{ end }}
