<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}Agent Reports</title>
    <meta name="description" content="{{ .Summary | default "AI Task Documentation" }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --code-bg: #f1f5f9;
            --pre-bg: #1e293b;
            --pre-color: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .site-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .site-header h1 {
            font-size: 2rem;
            margin: 0 0 0.5rem 0;
        }
        .site-header p {
            opacity: 0.9;
            margin: 0;
        }
        .site-header a {
            color: white;
            text-decoration: none;
        }
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .nav-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 2rem;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover,
        nav a.active {
            color: var(--primary);
        }
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
    </style>
    {{ block "head" . }}{{ end }}
</head>
<body>
    <header class="site-header">
        <h1><a href="/">🤖 Agent Reports</a></h1>
        <p>AI 任务执行报告与文档归档中心</p>
    </header>

    <nav>
        <div class="nav-content">
            <a href="/" {{ if .IsHome }}class="active"{{ end }}>首页</a>
            <a href="/reports/" {{ if eq .Section "reports" }}class="active"{{ end }}>所有报告</a>
        </div>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <p>Generated by pi-coding-agent · Built with Hugo · Deployed on Cloudflare Pages</p>
    </footer>
</body>
</html>
