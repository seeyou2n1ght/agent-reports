{{ define "head" }}
<style>
    .daily-list {
        display: grid;
        gap: 1.5rem;
    }
    .daily-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
        border-left: 4px solid var(--primary);
    }
    .daily-date {
        font-size: 0.875rem;
        color: var(--text-light);
        margin-bottom: 0.5rem;
    }
    .daily-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
    }
    .daily-title a {
        color: var(--text);
        text-decoration: none;
    }
    .daily-title a:hover {
        color: var(--primary);
    }
    .daily-summary {
        color: var(--text-light);
        font-size: 0.95rem;
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }
    .new-btn {
        background: var(--primary);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.875rem;
    }
    .new-btn:hover {
        background: var(--primary-dark);
    }
</style>
{{ end }}

{{ define "main" }}
<div class="section-header">
    <h1>📅 {{ .Title }}</h1>
    <a href="https://github.com/seeyou2n1ght/agent-reports/new/main/content/daily/2026-03" class="new-btn" target="_blank">+ 新建复盘</a>
</div>

<p style="color: var(--text-light); margin-bottom: 2rem;">
    每日任务回顾、新知记录与踩坑归档。
</p>

<div class="daily-list">
    {{ range .Pages }}
    <article class="daily-card">
        <div class="daily-date">{{ .Date.Format "2006年1月2日" }}</div>
        <h2 class="daily-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="daily-summary">{{ .Summary }}</p>
    </article>
    {{ end }}
</div>
{{ end }}
