<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Reports - AI Task Documentation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.125rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Stats Section */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* Report Cards */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .report-grid {
            display: grid;
            gap: 1.5rem;
        }

        .report-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
        }

        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .report-date {
            font-size: 0.875rem;
            color: var(--text-light);
            background: var(--bg);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
        }

        .report-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .report-card h3 a {
            color: var(--text);
            text-decoration: none;
        }

        .report-card h3 a:hover {
            color: var(--primary);
        }

        .report-summary {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .report-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            header h1 {
                font-size: 1.875rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            main {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Agent Reports</h1>
        <p>AI 任务执行报告与文档归档中心</p>
    </header>

    <nav>
        <div class="nav-content">
            <a href="/">首页</a>
            <a href="/reports/">所有报告</a>
        </div>
    </nav>

    <main>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="report-count">1</div>
                <div class="stat-label">总报告数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">2026</div>
                <div class="stat-label">起始年份</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">3+</div>
                <div class="stat-label">技术领域</div>
            </div>
        </div>

        <h2 class="section-title">📄 最新报告</h2>
        
        <div class="report-grid" id="latest-reports">
            <!-- 报告将通过 JavaScript 动态加载或手动添加 -->
            <article class="report-card">
                <div class="report-header">
                    <span class="report-date">2026-03-01</span>
                </div>
                <h3><a href="/reports/2026-03/telegram-bot-debug.html">Pi Telegram Bot 问题排查与架构重构</a></h3>
                <p class="report-summary">Telegram Bot 退出 TUI 后无响应问题的完整排查过程，包含架构分析、spawn 配置问题和解决方案。</p>
                <div class="report-tags">
                    <span class="tag">debug</span>
                    <span class="tag">nodejs</span>
                    <span class="tag">telegram</span>
                    <span class="tag">architecture</span>
                </div>
            </article>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/reports/" style="color: var(--primary); text-decoration: none; font-weight: 500;">查看所有报告 →</a>
        </div>
    </main>

    <footer>
        <p>Generated by pi-coding-agent · Deployed on Cloudflare Pages</p>
    </footer>
</body>
</html>
