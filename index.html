<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Reports</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>🤖 Agent Reports</h1>
        <p>AI 助手任务报告与产出物归档</p>
    </header>

    <main>
        <section class="intro">
            <h2>关于</h2>
            <p>本站点用于归档 AI 编码助手（pi-coding-agent）的任务报告、技术文档和项目总结。</p>
        </section>

        <section class="reports">
            <h2>📁 报告列表</h2>
            <div id="report-list" class="report-grid">
                <!-- 动态加载报告列表 -->
                <p class="loading">加载中...</p>
            </div>
        </section>

        <section class="stats">
            <h2>📊 统计</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-number" id="total-reports">-</span>
                    <span class="stat-label">总报告数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="total-tasks">-</span>
                    <span class="stat-label">完成任务</span>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Generated by pi-coding-agent | Deployed on Cloudflare Pages</p>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
